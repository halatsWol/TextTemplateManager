name: Release

# Push a version tag (e.g. v0.9.3) to build the installer and publish a GitHub release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the release

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $v = $tag -replace '^v', ''
          "version=$v" >> $env:GITHUB_OUTPUT
          # A tag with beta / preview / unstable / prev is published as a GitHub pre-release, so it
          # is only offered to clients that have "Allow beta updates" enabled.
          $pre = if ($tag -match '(?i)beta|prev|unstable') { 'true' } else { 'false' }
          "prerelease=$pre" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v (prerelease=$pre)"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install editor dependencies
        working-directory: editor
        run: npm ci

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: ./package.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Name the assets with the version
        shell: pwsh
        run: |
          Copy-Item "installer/TextTemplateManager-Setup.exe" `
                    "installer/TextTemplateManager-Setup-${{ steps.ver.outputs.version }}.exe"
          # package.ps1 regenerates the manual PDF (Assets/Manual.pdf) — ship it as an asset too.
          Copy-Item "Assets/Manual.pdf" `
                    "installer/TextTemplateManager-Manual-${{ steps.ver.outputs.version }}.pdf"
          # update.json: the client reads this to choose a delta matching its installed version, or
          # the full installer. No deltas are produced yet (they are added from the first release
          # after delta support ships); an empty list means every client takes the full installer.
          # manifest.json (from package.ps1) is uploaded so a later release can diff against it.
          $update = [ordered]@{
            version = "${{ steps.ver.outputs.version }}"
            full    = "TextTemplateManager-Setup-${{ steps.ver.outputs.version }}.exe"
            deltas  = @()
          }
          $update | ConvertTo-Json -Depth 4 | Set-Content "installer/update.json" -Encoding utf8

      - name: Render release notes from release.md
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = "${{ steps.ver.outputs.version }}"

          # Auto-generated "What's Changed" list (PRs/commits since the previous tag).
          $changelog = ""
          $json = gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" -f tag_name="$tag" 2>$null
          if ($LASTEXITCODE -eq 0 -and $json) { $changelog = ($json | ConvertFrom-Json).body }
          if ([string]::IsNullOrWhiteSpace($changelog)) { $changelog = "Initial release." }

          $notes = (Get-Content release.md -Raw).
                     Replace('{{VERSION}}', $ver).
                     Replace('{{TAG}}', $tag).
                     Replace('{{CHANGELOG}}', $changelog)
          Set-Content -Path release-notes.md -Value $notes
          Write-Host "----- release notes -----"; Get-Content release-notes.md

      - name: Create draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --draft: the release (and its installer) is uploaded but NOT published. Review it on
          # the Releases page and click "Publish release" when ready. Auto-update only sees
          # published releases, so clients won't be offered the update until you publish.
          # NOTE: the full Setup .exe is listed first on purpose. Older clients (and the fallback
          # path) pick the first .exe asset, and GitHub keeps upload order — so once delta .exe
          # assets are added in a later release, the full installer must stay the first-uploaded .exe.
          $ghArgs = @(
            "${{ github.ref_name }}",
            "installer/TextTemplateManager-Setup-${{ steps.ver.outputs.version }}.exe",
            "installer/TextTemplateManager-Manual-${{ steps.ver.outputs.version }}.pdf",
            "installer/manifest.json",
            "installer/update.json",
            "--title", "${{ github.ref_name }}",
            "--notes-file", "release-notes.md",
            "--draft"
          )
          if ("${{ steps.ver.outputs.prerelease }}" -eq 'true') { $ghArgs += "--prerelease" }
          gh release create @ghArgs
